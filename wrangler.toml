# Resumaestro Composer — Cloudflare Worker configuration
#
# Replace the placeholder ids (kv namespace id, vectorize index name) with the
# real values from your Cloudflare account before `wrangler deploy`.
# Run `wrangler kv namespace create RESEARCH_CACHE` to mint the KV id, and
# `wrangler vectorize create ...` (or reuse an existing index) for VECTOR_INDEX.

name = "composer"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Browser Rendering ships as a Node-compatible binding; nodejs_compat keeps
# @cloudflare/puppeteer's stream/buffer shims happy under strict bundling.
compatibility_flags = ["nodejs_compat"]

# --- Workers KV: historical research cache (Step 2 / Step 3) -----------------
[[kv_namespaces]]
binding = "RESEARCH_CACHE"
id = "<your_kv_namespace_id>"

# --- Vectorize: semantic matching index (Step 4) -----------------------------
# The legacy system uses 1024-dim cosine indices. Point this at the index you
# want Composer to query (e.g. "source-code-rag", "job-company", "job-role").
[[vectorize]]
binding = "VECTOR_INDEX"
index_name = "source-code-rag"

# --- Browser Rendering: edge headless Chrome (Step 3) ------------------------
[browser]
binding = "MY_BROWSER"

# --- Workers AI: zero-infrastructure edge models (Step 4 / Step 5) -----------
[ai]
binding = "AI"

# --- Plain vars (non-secret). Secrets go through `wrangler secret put`. -------
[vars]
EMBEDDING_MODEL = "@cf/qwen/qwen3-embedding-0.6b"
# CALLBACK_BASE_URL is the resumaestro framework seam. Result webhooks POST to
# `${CALLBACK_BASE_URL}/jobs/:id/result`. Override per-environment as needed.
CALLBACK_BASE_URL = "https://resumaestro.example.com"
# AI_GATEWAY_URL is the base of a Cloudflare AI Gateway. Leave blank to disable
# the premium routing tier (the worker then stays fully on Workers AI).
# Example: https://gateway.ai.cloudflare.com/v1/<account_id>/<gateway_slug>
AI_GATEWAY_URL = ""

# Secrets (set with `wrangler secret put <NAME>`), referenced in src/types.ts:
#   PREMIUM_API_KEY   — API key for the premium provider (e.g. Anthropic)
#   CALLBACK_TOKEN    — optional bearer token for the outbound result webhook
