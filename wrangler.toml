name = "resumaestro-composer"
main = "src/index.ts"
compatibility_date = "2025-06-01"

[observability]
enabled = true
invocation_logs = true
head_sampling_rate = 1

# --- Workers AI (embeddings + resume synthesis) ---
[ai]
binding = "AI"

# --- Vectorize ---
# source-code-rag: candidate experience chunks (read-only, ingested separately)
[[vectorize]]
binding = "VECTOR_INDEX"
index_name = "source-code-rag"

# Company research cache (written after researchCompany)
[[vectorize]]
binding = "RESUMAESTRO_COMPANIES"
index_name = "resumaestro-companies"

# Interviewer / people research cache (written by future people-research skill)
[[vectorize]]
binding = "RESUMAESTRO_TEAMMEMBERS"
index_name = "resumaestro-teammembers"

# Role / job-description cache (written after buildResume)
[[vectorize]]
binding = "RESUMAESTRO_ROLES"
index_name = "resumaestro-roles"

# --- D1 (queryable pipeline records) ---
[[d1_databases]]
binding = "DB"
database_name = "resumaestro-pipeline"
database_id = "72bff802-4593-4ed3-9c4f-1923bcb1b406"

# --- R2 (source files + pipeline outputs) ---
[[r2_buckets]]
binding = "RESUMAESTRO_SOURCE"
bucket_name = "resumaestro-source"

# --- KV (pipeline state: briefs and cached answers) ---
[[kv_namespaces]]
binding = "RESUMAESTRO_PIPELINE"
id = "2deb366330814a7ea7de36072fccaa77"

# --- KV (dynamic config: model names, feature flags) ---
[[kv_namespaces]]
binding = "RESUMAESTRO_CONFIG"
id = "0178e5c12f4945f0a230ac7d1f04b4fa"

# --- Service bindings ---
[[services]]
binding = "RESUMAESTRO"
service = "resumaestro-resumaestro"

# --- Secrets (DO NOT put values here; set them with `wrangler secret put <NAME>`) ---
#   wrangler secret put TAVILY_KEY   # web search API key used by researchCompany

[secrets]
required = ["TAVILY_KEY"]
